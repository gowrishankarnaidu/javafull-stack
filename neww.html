<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Me App - Signup</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f4f4f4; }
    input, button { padding: 12px; margin: 10px; font-size: 16px; width: 250px; }
    #otpSection { display: none; }
  </style>
</head>
<body>

<h1>Future Me App - Create Account</h1>

<form id="signupForm">
  <input type="text" id="fullName" placeholder="Full Name" required><br>
  <input type="tel" id="phoneNumber" placeholder="Phone (+countrycode)" required><br>
  <input type="password" id="password" placeholder="Password" required><br>
  <button type="button" id="sendOTP">Send OTP</button>
</form>

<div id="otpSection">
  <input type="number" id="otpInput" placeholder="Enter OTP"><br>
  <button id="verifyOTP">Verify OTP</button>
  <p id="timer"></p>
  <button id="resendBtn" disabled>Resend OTP</button>
</div>

<script>
  // 🔹 Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  let confirmationResult;
  let timeLeft = 60;

  const timerDisplay = document.getElementById("timer");
  const resendBtn = document.getElementById("resendBtn");

  function startTimer() {
    resendBtn.disabled = true;
    timerDisplay.innerText = `Resend OTP in ${timeLeft}s`;
    const countdown = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = `Resend OTP in ${timeLeft}s`;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        resendBtn.disabled = false;
        timerDisplay.innerText = "";
        timeLeft = 60;
      }
    }, 1000);
  }

  document.getElementById("sendOTP").onclick = () => {
    const phoneNumber = document.getElementById("phoneNumber").value;
    const appVerifier = new firebase.auth.RecaptchaVerifier(document.getElementById("sendOTP"), { size: 'invisible' });

    auth.signInWithPhoneNumber(phoneNumber, appVerifier)
      .then((result) => {
        confirmationResult = result;
        document.getElementById("otpSection").style.display = "block";
        startTimer();
        alert("OTP sent!");
      })
      .catch((error) => { alert(error.message); });
  };

  document.getElementById("verifyOTP").onclick = () => {
    const otpCode = document.getElementById("otpInput").value;
    const name = document.getElementById("fullName").value;
    const phone = document.getElementById("phoneNumber").value;
    const password = document.getElementById("password").value;

    confirmationResult.confirm(otpCode)
      .then((result) => {
        const user = result.user;
        // Save user to Firestore
        db.collection("users").doc(user.uid).set({
          fullName: name,
          phone: phone,
          password: password
        })
        .then(() => { alert("Account created successfully!"); })
        .catch((error) => { alert("Error saving user: " + error.message); });
      })
      .catch((error) => { alert("Incorrect OTP: " + error.message); });
  };

  resendBtn.onclick = () => {
    document.getElementById("sendOTP").click();
    startTimer();
  };
</script>

</body>
</html>
